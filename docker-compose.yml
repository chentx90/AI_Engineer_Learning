version: '3.8'

services:
  backend:
    build: ./backend
    container_name: ai_assistant_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/knowledge_base:/app/knowledge_base  # 挂载知识库持久化
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: ai_assistant_frontend
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped